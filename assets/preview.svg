<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="800" height="450" fill="#0A0D12"/>
    <rect x="0" y="0" width="800" height="450" fill="url(#bgGradient)"/>
    
    <!-- Title Area -->
    <text x="40" y="60" fill="white" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="28">Ultimate Optimizer Suite</text>
    <text x="40" y="85" fill="#64748B" font-family="Segoe UI, sans-serif" font-size="14">Professional Esports Tuning &amp; Diagnostics</text>

    <!-- FACEIT Safe Badge -->
    <rect x="650" y="40" width="110" height="24" rx="4" fill="#10B981" fill-opacity="0.2"/>
    <text x="705" y="57" fill="#10B981" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">FACEIT SAFE</text>

    <!-- Status Cards Row -->
    <!-- CPU -->
    <rect x="40" y="120" width="130" height="80" rx="6" fill="#1E293B"/>
    <text x="52" y="145" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12">CPU</text>
    <text x="52" y="170" fill="white" font-family="Segoe UI, sans-serif" font-size="14">AMD Ryzen 9</text>
    
    <!-- GPU -->
    <rect x="185" y="120" width="130" height="80" rx="6" fill="#1E293B"/>
    <text x="197" y="145" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12">GPU</text>
    <text x="197" y="170" fill="white" font-family="Segoe UI, sans-serif" font-size="14">RTX 4090</text>
    
    <!-- RAM -->
    <rect x="330" y="120" width="130" height="80" rx="6" fill="#1E293B"/>
    <text x="342" y="145" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12">RAM</text>
    <text x="342" y="170" fill="white" font-family="Segoe UI, sans-serif" font-size="14">32 GB DDR5</text>
    
    <!-- VBS Status (Warning Style) -->
    <rect x="475" y="120" width="130" height="80" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
    <text x="487" y="145" fill="#EF4444" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12">VBS STATUS</text>
    <text x="487" y="170" fill="#EF4444" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="14">DISABLED</text>

    <!-- Optimization Score -->
    <rect x="620" y="120" width="140" height="80" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="690" y="145" fill="#10B981" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">SCORE</text>
    <text x="690" y="175" fill="#10B981" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="24" text-anchor="middle">100%</text>

    <!-- Main Content Area -->
    <rect x="40" y="230" width="720" height="180" rx="8" fill="#121620"/>
    
    <!-- Left Panel: Action Buttons -->
    <text x="70" y="270" fill="white" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">ELITE OPTIMIZATION</text>
    
    <!-- Run All Button -->
    <rect x="70" y="290" width="280" height="50" rx="6" fill="#3B82F6"/>
    <text x="210" y="322" fill="white" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="16" text-anchor="middle">RUN ALL ELITE TWEAKS</text>
    
    <!-- Game Mode Button -->
    <rect x="70" y="355" width="280" height="40" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
    <text x="210" y="380" fill="#3B82F6" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">ACTIVATE GAME MODE</text>

    <!-- Right Panel: Log Simulation -->
    <rect x="380" y="250" width="360" height="140" rx="4" fill="#0A0D12"/>
    <text x="395" y="275" fill="#10B981" font-family="Consolas, monospace" font-size="12">[SUCCESS] Ultimate Power Plan Applied</text>
    <text x="395" y="295" fill="#10B981" font-family="Consolas, monospace" font-size="12">[SUCCESS] CS2 Priority: HIGH</text>
    <text x="395" y="315" fill="#10B981" font-family="Consolas, monospace" font-size="12">[SUCCESS] Network Latency Optimized (0.5ms)</text>
    <text x="395" y="335" fill="#10B981" font-family="Consolas, monospace" font-size="12">[SUCCESS] HAGS Enabled</text>
    <text x="395" y="355" fill="#3B82F6" font-family="Consolas, monospace" font-size="12">[INFO] Ready for Competitive Play...</text>

    <!-- Decorative Elements -->
    <defs>
        <linearGradient id="bgGradient" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0F172A" stop-opacity="0.5"/>
            <stop offset="1" stop-color="#020617" stop-opacity="0.8"/>
        </linearGradient>
    </defs>
</svg>
